name: Deploy Portfolio

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Proje klasörüne git (yoksa oluştur ve git'i ayarla)
            if [ ! -d "~/portfolio" ]; then
              git clone https://github.com/burakcnaksy0/portfolio.git ~/portfolio
            fi
            
            cd ~/portfolio
            
            # Kodları güncelle (GitHub'dan en son hali çek)
            git fetch --all
            git reset --hard origin/master
            
            # Docker servislerini ayağa kaldır
            # Not: Sunucuda Docker-Compose yüklü olduğunu biliyoruz (1-Click Docker Droplet)
            docker-compose down || true
            docker-compose up -d --build
            
            # Gereksiz imajları temizle
            docker image prune -f


