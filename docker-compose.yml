services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: portfolio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portfolio_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./portfolio-backend
      dockerfile: Dockerfile
    container_name: portfolio_backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/portfolio_db
      SPRING_DATASOURCE_USERNAME: portfolio_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-portfolio_pass}
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForDevelopmentOnlyChangeInProduction256Bits!}
      JWT_EXPIRATION_MS: 900000
      JWT_REFRESH_EXPIRATION_MS: 604800000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://burakcanaksoy.dev,https://www.burakcanaksoy.dev,http://localhost:5173}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-burakcanaksoy@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Q7!vR2@kZ9#Lm4^Xp}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./portfolio-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://burakcanaksoy.dev}
    container_name: portfolio_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://burakcanaksoy.dev}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt/live/burakcanaksoy.dev/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/burakcanaksoy.dev/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      - backend

volumes:
  postgres_data:
